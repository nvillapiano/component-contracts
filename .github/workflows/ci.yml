name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-commits:
    name: Lint commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  validate-contracts:
    name: Validate contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate

  build-tokens:
    name: Build tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm tokens:build

  test-web:
    name: Test web (React)
    runs-on: ubuntu-latest
    needs: [validate-contracts, build-tokens]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm tokens:build
      - run: pnpm --filter @ds/schema build
      - run: pnpm --filter @ds/contracts build
      - name: Build Storybook
        run: pnpm --filter @ds/web build:storybook
      - name: Install Playwright browsers
        run: pnpm --filter @ds/web exec playwright install chromium --with-deps
      - name: Serve Storybook and run tests
        run: |
          pnpm --filter @ds/web exec npx http-server storybook-static --port 6006 --silent &
          pnpm --filter @ds/web exec npx wait-on http://127.0.0.1:6006
          pnpm --filter @ds/web test:ci
